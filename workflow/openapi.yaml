openapi: 3.1.0
info:
  title: Upstash Workflow REST API
  description: |
    Upstash Workflow is a serverless workflow orchestration service built on top of Upstash QStash and Upstash Redis.
  version: 2.0.0
  contact:
    name: Upstash
    url: https://upstash.com
servers:
  - url: https://qstash.upstash.io
security:
  - bearerAuth: []
  - bearerAuthQuery: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: QStash authentication token
    bearerAuthQuery:
      type: apiKey
      in: query
      name: qstash_token
      description: QStash authentication token passed as a query parameter

  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message

    FlowControlKey:
      type: object
      properties:
        flowControlKey:
          type: string
          description: The flow control key name
        waitlistSize:
          type: integer
          description: The number of messages waiting due to flow control configuration.

    SigningKeys:
      type: object
      properties:
        current:
          type: string
          description: The current signing key.
        next:
          type: string
          description: The next signing key.

    WorkflowDLQMessage:
      type: object
      properties:
        dlqId:
          type: string
          description: The DLQ ID of the failed workflow message.
        workflowUrl:
          type: string
          description: The URL of the workflow.
        workflowRunId:
          type: string
          description: The ID of the workflow run.
        workflowCreatedAt:
          type: integer
          format: int64
          description: The timestamp when the workflow run was created (Unix timestamp in milliseconds).
        url:
          type: string
          description: The URL of the failed workflow step.
        method:
          type: string
          description: The HTTP method used for the workflow step.
        header:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: The HTTP headers sent to the workflow step.
        body:
          type: string
          description: The body of the message if it is composed of utf8 chars only, empty otherwise.
        bodyBase64:
          type: string
          description: The base64 encoded body if the body contains a non-utf8 char only, empty otherwise.
        maxRetries:
          type: integer
          description: The number of retries that should be attempted in case of delivery failure.
        createdAt:
          type: integer
          format: int64
          description: The unix timestamp in milliseconds when the message was created.
        failureCallback:
          type: string
          description: The url where we send a callback to after the workflow fails.
        callerIP:
          type: string
          description: IP address of the publisher of this workflow.
        label:
          type: string
          description: The label assigned to the workflow run.
        flowControlKey:
          type: string
          description: The flow control key used for rate limiting.
        failureFunctionState:
          type: string
          description: The state of the failure function if applicable.
        responseStatus:
          type: integer
          description: The HTTP status code received from the destination API.
        responseHeader:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: The HTTP response headers received from the destination API.
        responseBody:
          type: string
          description: The body of the response if it is composed of utf8 chars only, empty otherwise.
        responseBodyBase64:
          type: string
          description: The base64 encoded body of the response if the body contains a non-utf8 char only, empty otherwise.

    Waiter:
      type: object
      properties:
        url:
          type: string
          description: The URL that is waiting for the event notification.
        headers:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: The HTTP headers to send with the notification.
        deadline:
          type: integer
          format: int64
          description: The Unix timestamp in seconds when the wait operation times out.
        timeoutBody:
          type: string
          format: byte
          description: The body to send if the wait times out.
        timeoutUrl:
          type: string
          description: The URL to call if the wait times out.
        timeoutHeaders:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: The HTTP headers to send with the timeout callback.

    NotifyResponse:
      type: object
      properties:
        waiter:
          $ref: '#/components/schemas/Waiter'
          description: The waiter that was notified.
        messageId:
          type: string
          description: The ID of the notification message that was published.
        deduplicated:
          type: boolean
          description: Whether this notification was deduplicated.
        error:
          type: string
          description: Error message if the notification failed.
        workflowRunId:
          type: string
          description: The workflow run ID if the notification was sent within a workflow.
        workflowCreatedAt:
          type: integer
          format: int64
          description: The timestamp when the workflow run was created (Unix timestamp in milliseconds).

    WorkflowEvent:
      type: object
      properties:
        time:
          type: integer
          format: int64
          description: The timestamp of the event (Unix timestamp in milliseconds).
        state:
          type: string
          description: The state of the workflow or step (e.g., RUN_STARTED, STEP_SUCCESS, RUN_FAILED).
        workflowRunId:
          type: string
          description: The ID of the workflow run.
        workflowUrl:
          type: string
          description: The URL of the workflow.
        workflowCreatedAt:
          type: integer
          format: int64
          description: The timestamp when the workflow run was created (Unix timestamp in milliseconds).
        stepInfo:
          $ref: '#/components/schemas/StepInfo'
        nextDeliveryTime:
          type: integer
          format: int64
          description: The next scheduled delivery time for a retrying step (Unix timestamp in milliseconds).
        error:
          type: string
          description: Error message if the state is error.
        responseStatus:
          type: integer
          description: HTTP status code of the response for error states.
        responseBody:
          type: string
          description: Response body for error states.
        responseHeaders:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Response headers for error states.
        headers:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: The headers of the message.
        invokerWorkflowRunId:
          type: string
          description: The run ID of the workflow that started this workflow (only in RUN_STARTED).
        invokerWorkflowUrl:
          type: string
          description: The URL of the workflow that started this workflow (only in RUN_STARTED).
        invokerWorkflowCreatedAt:
          type: integer
          format: int64
          description: The creation timestamp of the invoker workflow (only in RUN_STARTED).
        workflowRunResponse:
          type: string
          description: The response returned by the workflow run (only in RUN_SUCCESS).
        dlqId:
          type: string
          description: The DLQ ID if the workflow run failed (only in RUN_FAILED).
        label:
          type: string
          description: Label of the workflow run.
        callerIp:
          type: string
          description: IP address of the client who submitted the workflow.

    StepInfo:
      type: object
      properties:
        stepId:
          type: integer
          format: int64
          description: The unique identifier for this step.
        stepName:
          type: string
          description: The name of the step.
        stepType:
          type: string
          description: The type of step (e.g., call, wait, sleep, invoke).
        callType:
          type: string
          description: The call type (e.g., step, parallelPlan, parallelResult).
        messageId:
          type: string
          description: The message ID for this step.
        state:
          type: string
          description: The state of the step (STEP_SUCCESS, STEP_RETRY, STEP_FAILED, STEP_PROGRESS, STEP_CANCELED).
        createdAt:
          type: integer
          format: int64
          description: When the step was created (Unix timestamp in milliseconds).
        out:
          type: string
          description: The output/result of the step.
        callUrl:
          type: string
          description: The URL called in this step.
        callMethod:
          type: string
          description: The HTTP method used.
        callBody:
          type: string
          description: The request body sent.
        callHeaders:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: The request headers sent.
        callResponseStatus:
          type: integer
          format: int64
          description: The HTTP status code received.
        callResponseBody:
          type: string
          description: The response body received.
        callResponseHeaders:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: The response headers received.
        waitEventId:
          type: string
          description: The event ID being waited for (wait steps only).
        waitTimeout:
          type: boolean
          description: Whether the wait timed out.
        invokedWorkflowRunId:
          type: string
          description: The run ID of the invoked workflow (invoke steps only).
        invokedWorkflowUrl:
          type: string
          description: The URL of the invoked workflow.
        retries:
          type: integer
          description: Maximum number of retries configured.
        nextDeliveryTime:
          type: integer
          format: int64
          description: Next scheduled retry time (Unix timestamp in milliseconds).

    GroupedSteps:
      type: object
      properties:
        steps:
          type: array
          items:
            $ref: '#/components/schemas/StepInfo'
          description: Array of steps in this group.
        type:
          type: string
          enum: [parallel, sequential, next]
          description: The type of grouping (parallel, sequential, or next).

    InvokerContext:
      type: object
      properties:
        workflowRunId:
          type: string
          description: The workflow run ID of the invoker.
        workflowUrl:
          type: string
          description: The workflow URL of the invoker.
        workflowRunCreatedAt:
          type: integer
          format: int64
          description: The creation timestamp of the invoker workflow run.

    FailureFunction:
      type: object
      properties:
        messageId:
          type: string
          description: The message ID of the failure callback.
        url:
          type: string
          description: The URL of the failure callback.
        state:
          type: string
          description: The state of the failure callback.
        dlqId:
          type: string
          description: The DLQ ID of the failure callback if it failed.
        failHeaders:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: The headers from the failed workflow step.
        failStatus:
          type: integer
          description: The status code from the failed workflow step.
        failResponse:
          type: string
          description: The response body from the failed workflow step.
        responseBody:
          type: string
          description: The response body from the failure callback attempt.
        responseHeaders:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: The response headers from the failure callback attempt.
        responseStatus:
          type: integer
          description: The response status from the failure callback attempt.
        maxRetries:
          type: integer
          description: Maximum number of retries configured for the failure callback.

    WorkflowRun:
      type: object
      properties:
        workflowRunId:
          type: string
          description: The unique identifier for this workflow run.
        workflowUrl:
          type: string
          description: The URL of the workflow.
        workflowState:
          type: string
          description: The current state of the workflow run (e.g., RUNNING, SUCCESS, FAILED).
        workflowRunCreatedAt:
          type: integer
          format: int64
          description: When the workflow run was created (Unix timestamp in milliseconds).
        workflowRunCompletedAt:
          type: integer
          format: int64
          description: When the workflow run completed (Unix timestamp in milliseconds).
        workflowRunCallerIp:
          type: string
          description: IP address of the client who triggered the workflow.
        steps:
          type: array
          items:
            $ref: '#/components/schemas/GroupedSteps'
          description: The workflow steps grouped by execution pattern.
        rawSteps:
          type: array
          items:
            $ref: '#/components/schemas/StepInfo'
          description: Raw list of all steps (only included if rawSteps parameter is true).
        workflowRunResponse:
          type: string
          description: The response returned by the workflow run.
        invoker:
          $ref: '#/components/schemas/InvokerContext'
          description: Information about the workflow that invoked this one.
        failureFunction:
          $ref: '#/components/schemas/FailureFunction'
          description: Information about the failure callback if configured.
        dlqId:
          type: string
          description: The DLQ ID if the workflow run failed.
        label:
          type: string
          description: Label assigned to the workflow run.

paths:
  /v2/trigger/{workflowUrl}:
    post:
      tags:
        - Runs
      summary: Trigger Workflow Run
      description: Start a new workflow run.
      parameters:
        - in: path
          name: workflowUrl
          required: true
          schema:
            type: string
          description: The URL of the workflow to trigger.
        - in: header
          name: Upstash-Workflow-RunId
          required: false
          schema:
            type: string
          description: Optional custom run ID for the workflow run. A random ID will be generated if not provided.
        - in: header
          name: Upstash-Retries
          required: false
          schema:
            type: integer
            default: 3
          description: Number of retries for the workflow steps in case of failure.
        - in: header
          name: Upstash-Delay
          required: false
          schema:
            type: integer
            default: 0
          description: Delay in seconds before starting the workflow run.
        - in: header
          name: Upstash-Flow-Control-Key
          required: false
          schema:
            type: string
          description: Flow control key to manage concurrency for the workflow run. Steps with the same key will respect the same concurrency limit.
        - in: header
          name: Upstash-Flow-Control-Value
          required: false
          schema:
            type: string
          description: |
            Parallelism and rate limit configuration for the flow control key in the format:
             `parallelism=<value>, rate=<value>, period=<value>`.
        - in: header
          name: Upstash-Label
          required: false
          schema:
            type: string
          description: Optional label to attach to the workflow run for easier identification in logs and DLQ.
        - in: header
          name: Upstash-Failure-Callback
          required: false
          schema:
            type: string
          description: Failure callback URL to be called if the workflow run fails after all retries.
        - name: Upstash-Retry-Delay
          in: header
          schema:
            type: string
          description: |
            Customize the delay between retry attempts when step delivery fails.

            By default, Upstash Workflow uses [exponential backoff](/qstash/features/retry). You can override this by providing a mathematical expressions to compute next delay. This expression is computed after each failed attempt.
            
            You can use the special variable `retried`, which is how many times the message has been retried. The `retried` is 0 for the first retry.
            
            Supported functions: 
            | Function    | Description                          |
            |-------------|--------------------------------------|
            | `pow(x, y)`| Returns x raised to the power of y|
            | `exp(x)`| Returns e raised to the power of x|
            | `sqrt(x)`| Takes the square root of x|
            | `abs(x)`| Returns the absolute value of x|
            | `floor(x)`| Returns the largest integer less than or equal to x|
            | `ceil(x)`| Returns the smallest integer greater than or equal to x|
            | `round(x)`| Rounds x to the nearest integer|
            | `min(x, y)`| Returns the smaller of x and y|
            | `max(x, y)`| Returns the larger of x and y|
            
            Examples:
            - `1000`: Fixed 1 second delay
            - `1000 * (1 + retried)`: Linear backoff
            - `pow(2, retried) * 1000`: Exponential backoff
            - `max(1000, pow(2, retried) * 100)`: Exponential with minimum 1s delay

      requestBody:
        description: The raw request payload passed to the workflow endpoints as is. You can access it via requestPayload parameter on the context object.
        content:
          text/plain:
            schema:
              type: string
          application/json:
            schema:
              type: object
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Workflow triggered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflowRunId:
                    type: string
                    description: The ID of the triggered workflow run.
                  workflowCreatedAt:
                    type: number
                    format: date-time
                    description: The timestamp when the workflow run was created.
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v2/workflows/runs/{workflowRunId}:
    delete:
      tags:
        - Runs
      summary: Cancel Workflow Run
      description: Cancel an ongoing workflow run.
      parameters:
        - in: path
          name: workflowRunId
          required: true
          schema:
            type: string
          description: The ID of the workflow run to cancel.
      responses:
        '200':
          description: Workflow run cancelled successfully
  /v2/workflows/runs:
    delete:
      tags:
        - Runs
      summary: Bulk Cancel Workflow Runs
      description: Cancel all matching workflow runs.
      parameters:
        - in: query
          name: workflowUrl
          required: true
          schema:
            type: string
          description: The URL of the workflow whose runs to cancel.
        - in: query
          name: workflowRunIds
          required: false
          schema:
            type: array
            items:
              type: string
          description: Optional list of specific workflow run IDs to cancel. If provided, the other filters are ignored.
        - in: query
          name: fromDate
          required: false
          schema:
            type: number
            format: date-time
          description: Optional start date to filter workflow runs to cancel. Unix timestamp in milliseconds.
        - in: query
          name: toDate
          required: false
          schema:
            type: number
            format: date-time
          description: Optional end date to filter workflow runs to cancel. Unix timestamp in milliseconds.
        - in: query
          name: callerIp
          required: false
          schema:
            type: string
          description: Optional caller IP address to filter workflow runs to cancel.
        - in: query
          name: flowControlKey
          required: false
          schema:
            type: string
          description: Optional flow control key to filter workflow runs to cancel.
        - in: query
          name: label
          required: false
          schema:
            type: string
          description: Optional label to filter workflow runs to cancel.
        - in: query
          name: count
          required: false
          schema:
            type: integer
            default: 100
          description: Maximum number of workflow runs to cancel. Default is 100.

      responses:
        '200':
          description: All workflow runs cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelled:
                    type: integer
                    description: The number of workflow runs that were cancelled.
  /v2/workflows/dlq/resume/{dlqId}:
    post:
      tags:
        - DLQ
      summary: Resume Workflow from DLQ
      description: |
        Resume a failed workflow run from the DLQ. The workflow will continue from where it failed.

        When a workflow is resumed, it continues execution from the last failed step. A new workflow run ID is generated,
        but the workflow maintains the state and results from previously completed steps.

        You can pass configuration headers (with `Upstash-` prefix) to override the configuration of the workflow steps.
        For example, to change the retry count for remaining steps, pass `Upstash-Retries: 5` header.
        Available configuration headers include: `Upstash-Retries`, `Upstash-Delay`, `Upstash-Retry-Delay`,
        `Upstash-Flow-Control-Key`, `Upstash-Flow-Control-Value`, `Upstash-Label`, and `Upstash-Failure-Callback`.
      parameters:
        - in: path
          name: dlqId
          required: true
          schema:
            type: string
          description: The DLQ ID of the workflow run to resume.
        - in: header
          name: Upstash-Retries
          required: false
          schema:
            type: integer
          description: Override the number of retries for the remaining workflow steps.
        - in: header
          name: Upstash-Delay
          required: false
          schema:
            type: string
          description: Override the delay before executing the next workflow step. Format is `<value><unit>` (e.g., "10s", "5m").
        - in: header
          name: Upstash-Retry-Delay
          required: false
          schema:
            type: string
          description: Override the retry delay expression for the remaining workflow steps.
        - in: header
          name: Upstash-Flow-Control-Key
          required: false
          schema:
            type: string
          description: Override the flow control key for the remaining workflow steps.
        - in: header
          name: Upstash-Flow-Control-Value
          required: false
          schema:
            type: string
          description: Override the flow control configuration in the format `parallelism=<value>, rate=<value>, period=<value>`.
        - in: header
          name: Upstash-Label
          required: false
          schema:
            type: string
          description: Override the label for the remaining workflow steps.
        - in: header
          name: Upstash-Failure-Callback
          required: false
          schema:
            type: string
          description: Override the failure callback URL for the remaining workflow steps.
      responses:
        '200':
          description: Workflow resumed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflowRunId:
                    type: string
                    description: The ID of the resumed workflow run (a new ID is generated for the resumed run).
                  workflowCreatedAt:
                    type: integer
                    format: int64
                    description: The timestamp when the resumed workflow run was created (Unix timestamp in milliseconds).
        '400':
          description: Bad Request - Invalid DLQ ID, not a workflow message, or workflow doesn't support resume
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: DLQ message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v2/workflows/dlq/resume:
    post:
      tags:
        - DLQ
      summary: Bulk Resume Workflows from DLQ
      description: |
        Resume multiple failed workflow runs from the DLQ. Each workflow will continue from where it failed.

        When workflows are resumed, they continue execution from their last failed step. New workflow run IDs are generated,
        but the workflows maintain the state and results from previously completed steps.

        You can pass configuration headers (with `Upstash-` prefix) to override the configuration of the workflow steps.
        For example, to change the retry count for remaining steps, pass `Upstash-Retries: 5` header.
        Available configuration headers include: `Upstash-Retries`, `Upstash-Delay`, `Upstash-Retry-Delay`,
        `Upstash-Flow-Control-Key`, `Upstash-Flow-Control-Value`, `Upstash-Label`, and `Upstash-Failure-Callback`.
      parameters:
        - in: query
          name: dlqIds
          required: false
          schema:
            type: array
            items:
              type: string
          description: List of specific DLQ IDs to resume. If provided, other filters are ignored.
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: Pagination cursor for resuming workflows in batches.
        - in: query
          name: count
          required: false
          schema:
            type: integer
          description: Maximum number of workflows to resume. If not provided, all matching workflows will be resumed.
        - in: query
          name: fromDate
          required: false
          schema:
            type: integer
            format: int64
          description: Filter workflows by starting date, in milliseconds (Unix timestamp). This is inclusive.
        - in: query
          name: toDate
          required: false
          schema:
            type: integer
            format: int64
          description: Filter workflows by ending date, in milliseconds (Unix timestamp). This is inclusive.
        - in: query
          name: workflowUrl
          required: false
          schema:
            type: string
          description: Filter workflows by workflow URL.
        - in: query
          name: workflowRunId
          required: false
          schema:
            type: string
          description: Filter workflows by workflow run ID.
        - in: query
          name: workflowCreatedAt
          required: false
          schema:
            type: integer
            format: int64
          description: Filter workflows by creation timestamp in milliseconds (Unix timestamp).
        - in: query
          name: label
          required: false
          schema:
            type: string
          description: Filter workflows by label assigned by the user.
        - in: query
          name: failureFunctionState
          required: false
          schema:
            type: string
          description: Filter workflows by failure function state.
        - in: query
          name: callerIp
          required: false
          schema:
            type: string
          description: Filter workflows by IP address of the publisher.
        - in: query
          name: flowControlKey
          required: false
          schema:
            type: string
          description: Filter workflows by Flow Control Key.
        - in: header
          name: Upstash-Retries
          required: false
          schema:
            type: integer
          description: Override the number of retries for the remaining workflow steps.
        - in: header
          name: Upstash-Delay
          required: false
          schema:
            type: string
          description: Override the delay before executing the next workflow step. Format is `<value><unit>` (e.g., "10s", "5m").
        - in: header
          name: Upstash-Retry-Delay
          required: false
          schema:
            type: string
          description: Override the retry delay expression for the remaining workflow steps.
        - in: header
          name: Upstash-Flow-Control-Key
          required: false
          schema:
            type: string
          description: Override the flow control key for the remaining workflow steps.
        - in: header
          name: Upstash-Flow-Control-Value
          required: false
          schema:
            type: string
          description: Override the flow control configuration in the format `parallelism=<value>, rate=<value>, period=<value>`.
        - in: header
          name: Upstash-Label
          required: false
          schema:
            type: string
          description: Override the label for the remaining workflow steps.
        - in: header
          name: Upstash-Failure-Callback
          required: false
          schema:
            type: string
          description: Override the failure callback URL for the remaining workflow steps.
