  /v2/notify/{eventId}:
    post:
      tags:
        - Notify
      summary: Notify Event
      description: |
        Notify an event to all waiters listening for that event ID.

        This endpoint broadcasts an event to all active waiters that are waiting for the specified event.
        Each waiting workflow step receives the event data and continues execution.

        **Important:** This is an "unsafe notify" operation - if there are no active waiters when the
        notification is sent, the event is lost and will not be delivered later. For guaranteed delivery
        within a specific workflow run, use the `/v2/notify/{workflowRunId}/{eventId}` endpoint instead.

        Workflow calls (with `Upstash-Workflow-RunId` header) are exempt from daily quota limits.
      parameters:
        - in: path
          name: eventId
          required: true
          schema:
            type: string
          description: The event ID that waiters are listening for.
      requestBody:
        description: The event data to send to all waiters. This will be the request payload for waiting workflow steps.
        required: false
        content:
          application/json:
            schema:
              type: object
          text/plain:
            schema:
              type: string
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Event notification sent successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotifyResponse'
                description: Array of notification results, one for each notified waiter.
        '400':
          description: Bad Request - Invalid event ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate Limit Exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v2/notify/{workflowRunId}/{eventId}:
    post:
      tags:
        - Notify
      summary: Notify Workflow Run Event
      description: |
        Notify an event to a specific workflow run's waiters.

        This endpoint sends an event notification to waiters within a specific workflow run.
        Unlike the general notify endpoint, this uses a "safe notify" mechanism that guarantees
        delivery even if no waiter is currently active.

        **Safe Notify Behavior:**
        - If a waiter is currently active, it receives the notification immediately
        - If no waiter is active, the notification is saved in the database
        - When a waiter becomes active later, it will consume the saved notification
        - This ensures events are never lost due to timing issues

        Workflow calls (with `Upstash-Workflow-RunId` header) are exempt from daily quota limits.
      parameters:
        - in: path
          name: workflowRunId
          required: true
          schema:
            type: string
          description: The workflow run ID to notify.
        - in: path
          name: eventId
          required: true
          schema:
            type: string
          description: The event ID that waiters are listening for.
      requestBody:
        description: The event data to send to the waiter. This will be the request payload for the waiting workflow step.
        required: false
        content:
          application/json:
            schema:
              type: object
          text/plain:
            schema:
              type: string
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Event notification sent or saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotifyResponse'
        '400':
          description: Bad Request - Invalid workflow run ID or event ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate Limit Exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v2/waiters/{eventId}:
    get:
      tags:
        - Notify
      summary: List Waiters
      description: |
        List all active waiters for a specific event ID.

        Returns information about all workflow runs that are currently waiting for the specified event.
      parameters:
