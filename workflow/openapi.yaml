          name: eventId
          required: true
          schema:
            type: string
          description: The event ID to list waiters for.
      responses:
        '200':
          description: List of active waiters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Waiter'
                description: Array of waiters currently listening for this event.
        '400':
          description: Bad Request - Invalid event ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v2/workflows/logs:
    get:
      tags:
        - Logs
      summary: List Workflow Run Logs
      description: |
        List and filter workflow run logs with detailed execution information.

        This endpoint provides comprehensive visibility into workflow executions. It supports two modes:

        **Event Mode (default):** Returns individual workflow events (state transitions, step completions, errors).
        Use this mode to track detailed execution history and debug specific steps.

        **Run Mode (groupBy=workflowRunId):** Returns complete workflow runs with all steps grouped together.
        Use this mode to get a holistic view of workflow executions and their final states.

        The endpoint supports powerful filtering by workflow URL, run ID, state, date range, and more.
        Results are paginated using a cursor for efficient browsing of large datasets.
      parameters:
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: Pagination cursor for fetching the next page of results.
        - in: query
          name: groupBy
          required: false
          schema:
            type: string
            enum: [workflowRunId]
          description: |
            Group results by workflow run. When set to "workflowRunId", returns complete workflow runs
            instead of individual events. Maximum 10 runs per page when grouped (vs 1000 events in event mode).
        - in: query
          name: workflowUrl
          required: false
          schema:
            type: string
          description: Filter by workflow URL (exact match). Must start with http:// or https://.
        - in: query
          name: workflowRunId
          required: false
          schema:
            type: string
          description: Filter by specific workflow run ID. When used with groupBy=workflowRunId, count must be 1.
        - in: query
          name: workflowCreatedAt
          required: false
          schema:
            type: integer
            format: int64
          description: Filter by workflow creation timestamp in milliseconds (Unix timestamp).
        - in: query
          name: messageId
          required: false
          schema:
            type: string
          description: Filter by specific message ID.
        - in: query
          name: state
          required: false
          schema:
            type: string
          description: |
            Filter by workflow or step state. Common states include:
            - RUN_STARTED, RUN_SUCCESS, RUN_FAILED, RUN_CANCELED
            - STEP_SUCCESS, STEP_RETRY, STEP_FAILED, STEP_PROGRESS, STEP_CANCELED
        - in: query
          name: fromDate
          required: false
          schema:
            type: integer
            format: int64
          description: Filter events from this date onwards in milliseconds (Unix timestamp). Inclusive.
        - in: query
          name: toDate
          required: false
          schema:
            type: integer
            format: int64
          description: Filter events up to this date in milliseconds (Unix timestamp). Inclusive.
        - in: query
          name: count
          required: false
          schema:
            type: integer
            default: 1000
            maximum: 1000
          description: |
            Maximum number of results to return per page.
            - Event mode: Max 1000 (default 1000)
            - Run mode (groupBy=workflowRunId): Max 10 (default 10)
        - in: query
          name: trimBody
          required: false
          schema:
            type: integer
            default: -1
          description: |
            Trim request/response bodies to this many bytes. Use -1 to exclude bodies entirely.
            Useful for reducing response size when bodies are large.
        - in: query
          name: rawSteps
          required: false
          schema:
            type: boolean
            default: false
          description: |
            Include raw, ungrouped step list in workflow runs (only applies when groupBy=workflowRunId).
            By default, steps are grouped by execution pattern (parallel/sequential).
      responses:
        '200':
          description: Workflow logs retrieved successfully
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    title: Event Mode Response
                    properties:
                      cursor:
                        type: string
                        description: Pagination cursor for the next page. Empty if no more results.
                      events:
                        type: array
                        items:
                          $ref: '#/components/schemas/WorkflowEvent'
                        description: Array of workflow events (state transitions, step completions, errors).
                  - type: object
                    title: Run Mode Response (groupBy=workflowRunId)
                    properties:
                      cursor:
                        type: string
                        description: Pagination cursor for the next page. Empty if no more results.
                      runs:
                        type: array
                        items:
                          $ref: '#/components/schemas/WorkflowRun'
                        description: Array of complete workflow runs with all steps and metadata.
        '400':
          description: Bad Request - Invalid parameters (e.g., invalid cursor, state, or groupBy value)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too Many Requests - Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
