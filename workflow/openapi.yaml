  /v2/workflows/dlq/callback/{dlqId}:
    post:
      tags:
        - DLQ
      summary: Retry Failure Callback
      description: |
        If the failure callback for a workflow run has failed, you can use this endpoint to manually trigger the failure callback again. 
        This is useful for ensuring that your system is notified of workflow failures even if the original callback attempt did not succeed.

        The state of the failure callback for each workflow run is included in the DLQ message response as failureCallbackInfo.state. 
        You can filter for all workflow runs with a failed failure callback by using the failureCallbackState filter when listing workflow runs in the DLQ with the `/v2/workflows/dlq` endpoint.
      parameters:
        - in: path
          name: dlqId
          required: true
          schema:
            type: string
          description: The DLQ ID of the failed workflow run whose failure callback should be retried.
      responses:
        "200":
          description: Failure callback retried successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflowRunId:
                    type: string
                    description: The ID of the workflow run.
                  workflowCreatedAt:
                    type: integer
                    format: int64
                    description: The timestamp when the workflow run was created (Unix timestamp in milliseconds).
        "400":
          description: Bad Request. Workflow doesn't have a failed callback, callback is already in-progress, succeeded, or was canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: DLQ message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - DLQ
      summary: Cancel In-Progress Failure Callback
      description: |
        Cancel an in-progress failure callback for a failed workflow.

        When you retry a failed failure callback using the POST endpoint, it enters an in-progress state.
        This endpoint allows you to cancel that in-progress callback before it completes.

        The callback must be in an in-progress state. If there's no in-progress callback,
        the request will fail with a 400 error.
      parameters:
        - in: path
          name: dlqId
          required: true
          schema:
            type: string
          description: The DLQ ID of the workflow run whose in-progress failure callback should be canceled.
      responses:
        "302":
          description: Failure callback canceled successfully
        "400":
          description: Bad Request - No in-progress failure callback to cancel, or callback information is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Failure callback not found or message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error" 
