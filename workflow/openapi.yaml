              schema:
                $ref: '#/components/schemas/Error'
  /v2/flowControl/{flowControlKey}/pin:
    post:
      summary: Pin Configuration for Flow Control Key
      description: Pins a processing configuration for a specific flow-control key.
      x-mint: 
        content: |
          Normally, each message sent to QStash includes a flow-control configuration for the corresponding flow-control key. 
          The processing configuration is updated based on configurations provided by incoming messages.

          This means that if you want to change the configuration, you typically need to update it in your code and wait until a new message with the updated configuration is sent.

          By pinning a configuration, you can enforce a fixed configuration for a flow-control key. 
          While pinned, the system ignores configurations provided by incoming messages and continues using the pinned configuration until it is explicitly unpinned.

          This allows you to increase or decrease processing throughput without requiring code changes or waiting for new messages with updated configurations.
          For example, you can temporarily increase the processing speed to clear a backlog of pending messages, or decrease it when a downstream dependency is experiencing issues.

          <Warning>Pinning a configuration resets the current state (rate count and period) of the flow-control key.</Warning>
      tags:
        - Flow Control
      parameters:
        - name: flowControlKey
          in: path
          required: true
          schema:
            type: string
          description: The flow-control key for which the configuration will be pinned.
        - name: parallelism
          in: query
          schema:
            type: integer
          description: The parallelism value to apply to the flow-control key.
        - name: rate
          in: query
          schema:
            type: integer
          description: The rate value to apply to the flow-control key.
        - name: period
          in: query
          schema:
            type: integer
          description: The period value to apply to the flow-control key, in seconds.
      responses:
        '200':
          description: The flow-control key configuration has been pinned.
        '400':
          description: Bad request. Returned when the flow-control key is not provided, or when the parallelism, rate or period values are invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v2/flowControl/{flowControlKey}/unpin:
    post:
      summary: Unpin Configuration for Flow Control Key
      description: Removes the pinned configuration for a specific flow-control key.
      x-mint: 
        content: |
          Normally, each message sent to QStash includes a flow-control configuration for the corresponding flow-control key, and the processing configuration is updated according to incoming messages.

          When a configuration is pinned, the system ignores configurations provided by incoming messages and continues using the pinned configuration.

          Calling this endpoint removes the pinned configuration. After unpinning, the system resumes the default behavior and updates the configuration based on configurations provided by incoming messages.

          Message delivery will initially continue using the last pinned configuration. Once a new message with a different configuration is received, the system updates the configuration accordingly.

          Use this API when you want to return to the default flow-control behavior after temporarily pinning a configuration.
      tags:
        - Flow Control
      parameters:
        - name: flowControlKey
          in: path
          required: true
          schema:
            type: string
          description: The flow-control key for which the configuration will be unpinned.
        - name: parallelism
          in: query
          schema:
            type: boolean
            default: false
          description: The flag to indicate whether to unpin the parallelism configuration.
        - name: rate
          in: query
          schema:
            type: boolean
            default: false
          description: The flag to indicate whether to unpin the rate configuration.
      responses:
        '200':
          description: The flow-control key configuration is pinned
        '400':
          description: Bad request. Returned when the flow-control key is not provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v2/flowControl/{flowControlKey}/resetRate:
    post:
      summary: Reset Rate for Flow Control Key
      description: Resets the rate configuration state for a specific flow-control key.
      x-mint: 
        content: |
          Rate configuration limits the number of messages delivered within a given time period for messages sharing the same flow-control key.

          When the rate limit is reached, subsequent messages with the same flow-control key are placed in the waitlist and are not delivered until the next time period begins.

          In some situations, you may want to immediately resume message delivery without waiting for the current period to expire. Resetting the rate configuration clears the current rate count and immediately ends the current period.

          After the reset, the current timestamp becomes the start of the new rate period.
      tags:
        - Flow Control
      parameters:
        - name: flowControlKey
          in: path
          required: true
          schema:
            type: string
          description: The flow-control key for which the rate state will be reset.
      responses:
        '200':
          description: The rate state for the flow-control key has been reset.
        '400':
          description: Bad request. Returned when the flow-control key is not provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error. Returned when an unexpected error occurs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
